            const inputVal = document.getElementById('company-name-input').value.trim();
            if (!inputVal) {
                alert("업체명을 입력해주십시오.");
                return;
            }

            const loader = document.getElementById('console-loader');
            const reportCard = document.getElementById('report-container');
            
            // Reset views
            reportCard.style.display = 'none';
            loader.style.display = 'block';
            loader.innerHTML = '';

            const logs = [
                { text: "▶ DART API 인증키 검증 완료 (crtfc_key: c11b6750932e...)" },
                { text: `▶ 분석 대상 기업 '${inputVal}' 검색...` },
                { text: "▶ DART 고유번호 XML 다운로드 및 8자리 corp_code 조회..." },
                { text: "", isMapping: true },
                { text: "▶ 단일회사 전체 재무제표 API 수집 중... (fnlttSinglAcntAll.json)" },
                { text: "▶ 재무제표 수집 완료 (영업이익/매출원가/재고자산 계정 매핑 성공)" },
                { text: "▶ 재무제표 주석(Footnote) XML 다운로드 및 텍스트 마이닝 개시..." },
                { text: "▶ 키워드 스캐닝: '재고자산평가손실', '평가손실충당금' 주석 테이블 분석 중..." },
                { text: "", isMining: true },
                { text: "▶ 실질 영업이익 계산 및 업종별 킬러 지표(롤마진/스프레드) 교차 검증 완료." },
                { text: "✔ [신용분석 보고서 렌더링 완료]", isSuccess: true }
            ];

            let index = 0;
            
            function printNextLine() {
                if (index >= logs.length) {
                    setTimeout(() => {
                        loader.style.display = 'none';
                        showReport(inputVal);
                    }, 500);
                    return;
                }

                const logItem = logs[index];
                const line = document.createElement('div');
                line.className = 'console-line';

                if (logItem.isMapping) {
                    let mappedName = corpNameMapping[inputVal.toLowerCase().replace(/\s+/g, '')] || "포스코홀딩스";
                    let code = creditDB[mappedName] ? creditDB[mappedName].corpCode : "00165413";
                    line.innerHTML = `<span class="console-success">[성공] corp_code 맵핑 완료: '${inputVal}' -> DART 고유번호 [${code}]</span>`;
                } else if (logItem.isMining) {
                    let mappedName = corpNameMapping[inputVal.toLowerCase().replace(/\s+/g, '')] || "롯데케미칼";
                    let comp = creditDB[mappedName] || creditDB["롯데케미칼"];
                    let amountTxt = comp.financials.inventoryReversal > 0 
                        ? `환입 ${(comp.financials.inventoryReversal / 100000000).toFixed(1)}억 원 검출`
                        : `손실 ${(comp.financials.inventoryValLoss / 100000000).toFixed(1)}억 원 검출`;
                    line.innerHTML = `<span class="console-success">[성공] ${amountTxt} (기말 재고: ${(comp.financials.endingInventory / 1000000000000).toFixed(2)}조 원)</span>`;
                } else if (logItem.isSuccess) {
                    line.innerHTML = `<span class="console-success">${logItem.text}</span>`;
                } else {
                    line.innerText = logItem.text;
                }

                loader.appendChild(line);
                loader.scrollTop = loader.scrollHeight;
                index++;
                
                setTimeout(printNextLine, 250);
            }

            printNextLine();
        }

        function showReport(inputName) {
            const reportCard = document.getElementById('report-container');
            const paper = document.getElementById('report-paper-content');

            // Find match
            let matchedKey = null;
            const normalized = inputName.toLowerCase().replace(/\s+/g, '');
            for (const key in corpNameMapping) {
                if (key.includes(normalized) || normalized.includes(key)) {
                    matchedKey = corpNameMapping[key];
                    break;
                }
            }

            let comp = creditDB[matchedKey];
            
            // Mock dynamic generation if not pre-defined
            if (!comp) {
                const isChemical = normalized.includes('화학') || normalized.includes('유화') || normalized.includes('에너지') || normalized.includes('석화') || normalized.includes('케미');
                const sector = isChemical ? "석유화학" : "철강";
                comp = {
                    name: inputName,
                    sector: sector,
                    corpCode: "00" + Math.floor(100000 + Math.random() * 900000),
                    level: "Yellow",
                    isSteel: !isChemical,
                    judgeResult: !isChemical ? "매출 비중 및 원재료 구성을 근거로 ‘고로 기반 판재류 주력’으로 판별함." : "해당사항 없음 (철강 업종 아님)",
                    metrics: {
                        rollMargin: isChemical ? 190 : 255,
                        inventoryDays: 8.5
                    },
                    bep: {
                        rollMargin: 300,
                        inventoryDays: 6
                    },
                    financials: {
                        reportedOP: 82000000000,
                        reportedOP2025: 145000000000,
                        inventoryValLoss: isChemical ? 12000000000 : 8500000000,
                        inventoryReversal: 0,
                        endingInventory: 1120000000000,
                        allowance: 34000000000,
                        inventoryDaysCurrent: 62.5,
                        inventoryDaysPrior: 54.0,
                        inventoryDaysDiff: 8.5
                    },
                    opinion: `${inputName}은(는) 선행 마진 지표가 BEP 가이드라인을 하회하며, 재고평가손실이 발생하여 이익 구조를 잠식하고 있는 리스크 흐름이 검출되었습니다. 보수적인 크레딧 관점에서의 모니터링 강화를 지시합니다.`
                };
            }

            const badgeClass = comp.level === 'Red' ? 'report-badge-red' : (comp.level === 'Yellow' ? 'report-badge-yellow' : 'report-badge-green');
            const calloutClass = comp.level === 'Red' ? 'box-callout-red' : (comp.level === 'Yellow' ? 'box-callout-yellow' : 'box-callout-green');
            const calloutTxt = comp.level === 'Red' 
                ? `🚨 [경고 - Red 등급] 핵심 마진 스프레드가 심각한 적자 국면에 고착화되었으며 재고평가손실로 인한 실질 손익 훼손이 뚜렷하여 1~3년 내 디폴트 및 신용강등 리스크가 극도로 높습니다.`
                : (comp.level === 'Yellow'
                    ? `⚠️ [주의 - Yellow 등급] 롤마진이 손익분기점(BEP)을 하회하고 있으며, 운전자본 적체 및 재고평가 영향이 실적을 일정 부분 잠식하여 경계 단계의 모니터링이 요구됩니다.`
                    : `✅ [정상 - Green 등급] 주요 지표가 손익분기점을 지지하고 있으며 재고 기일 변동이 원만하여 단기적 다운사이드 위험 징후가 낮습니다.`);

            // Numbers format
            const reportedOPText = (comp.financials.reportedOP / 100000000).toFixed(2) + "억 원";
            const reportedOP2025Text = (comp.financials.reportedOP2025 / 100000000).toFixed(2) + "억 원";
            
            let inventoryValTxt = "";
            let adjustedOPText = "";
            
            if (comp.financials.inventoryReversal > 0) {
                const valText = (comp.financials.inventoryReversal / 100000000).toFixed(2) + "억 원";
                const realOP = (comp.financials.reportedOP - comp.financials.inventoryReversal) / 100000000;
                adjustedOPText = realOP.toFixed(2) + "억 원";
                inventoryValTxt = `당기 재고자산평가손실환입 [${valText}]이 발생하여, 당기 영업이익 [${reportedOPText}]의 [${(comp.financials.inventoryReversal / comp.financials.reportedOP * 100).toFixed(1)}%]를 잠식(착시효과 기여)함.`;
            } else {
                const valText = (comp.financials.inventoryValLoss / 100000000).toFixed(2) + "억 원";
                const realOP = (comp.financials.reportedOP + comp.financials.inventoryValLoss) / 100000000;
                adjustedOPText = realOP.toFixed(2) + "억 원";
                inventoryValTxt = `당기 재고자산평가손실 [${valText}]이 발생하여, 당기 영업이익 [${reportedOPText}]의 [${(comp.financials.inventoryValLoss / comp.financials.reportedOP * 100).toFixed(1)}%]를 잠식함.`;
            }

            let metricLabel = comp.sector === '철강' ? '고로 열연 롤마진' : (comp.sector === '석유화학' ? '에틸렌-나프타 스프레드' : '싱가포르 복합 정제마진');
            let bepUnit = comp.sector === '에너지/정유' ? '$/BBL' : '$/TON';
            let formattedRollMargin = comp.sector === '에너지/정유' ? `$${comp.metrics.rollMargin}` : `$${comp.metrics.rollMargin}`;

            paper.innerHTML = `
                <div class="report-header">
                    <div class="report-title">
                        <h2>기업 신용위험 심사 리포트</h2>
                        <p>DART 실시간 API & 주석 데이터 교차 검증 연동 결과</p>
                    </div>
                    <div class="report-badge ${badgeClass}">
                        위험등급 : ${comp.level}
                    </div>
                </div>

                <div class="report-section">
                    <div class="report-section-title">■ [${comp.name} / ${comp.sector}] 위험등급 : ${comp.level}</div>
                </div>

                <div class="report-section">
                    <div class="report-section-title">■ 분석대상 기업이 철강업종일 경우 주력 부문 판결 결과</div>
                    <div class="report-text" style="font-weight: 700;">${comp.isSteel ? comp.judgeResult : "해당사항 없음 (석유화학/정유 업종)"}</div>
                </div>

                <div class="report-section">
                    <div class="report-section-title">■ 리스크 트리거 요인</div>
                    <div class="report-text" style="font-weight: 700; color: #ef4444;">
                        ${comp.sector === '철강' 
                            ? `고로 롤마진($${comp.metrics.rollMargin})이 BEP($300) 하회, 재고증가 기일 변동 발생` 
                            : (comp.sector === '석유화학' 
                                ? `에틸렌 스프레드($${comp.metrics.rollMargin})가 BEP($300) 장기 하회, 영업이익 기저효과 발생` 
                                : `정제마진($${comp.metrics.rollMargin}) BEP($4.5) 하회 및 평가손실 영업이익 초과 잠식`)}
                    </div>
                    <div class="box-callout ${calloutClass}">
                        ${calloutTxt}
                    </div>
                </div>

                <div class="report-section">
                    <div class="report-section-title">■ 상세 분석(정량/정성)</div>
                    
                    <h3 style="font-size: 14px; font-weight: 700; margin-bottom: 10px;">[정량 데이터]</h3>
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>킬러 지표 항목</th>
                                <th>현재 공시치</th>
                                <th>BEP 가이드라인</th>
                                <th>마진 스프레드 Gap</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>${metricLabel}</td>
                                <td>${formattedRollMargin} ${bepUnit}</td>
                                <td>$${comp.bep.rollMargin} ${bepUnit}</td>
                                <td style="font-weight: 700; color: ${comp.metrics.rollMargin < comp.bep.rollMargin ? '#ef4444' : '#059669'}">
                                    Gap: ${(comp.metrics.rollMargin - comp.bep.rollMargin).toFixed(1)} ${bepUnit}
                                </td>
                            </tr>
                            ${comp.name === '현대제철' ? `
                            <tr>
                                <td>봉형강-철스크랩 스프레드</td>
                                <td>${comp.metrics.barSpread} 만원/톤</td>
                                <td>35 만원/톤</td>
                                <td style="font-weight: 700; color: ${comp.metrics.barSpread < 35 ? '#ef4444' : '#059669'}">
                                    Gap: ${(comp.metrics.barSpread - 35).toFixed(1)} 만원
                                </td>
                            </tr>` : ''}
                            <tr>
                                <td>재고 회전기일</td>
                                <td>${comp.financials.inventoryDaysCurrent} 일</td>
                                <td>${comp.financials.inventoryDaysPrior} 일 (전년동기)</td>
                                <td style="font-weight: 700; color: ${comp.financials.inventoryDaysDiff >= 6 ? '#d97706' : '#059669'}">
                                    증감: ${comp.financials.inventoryDaysDiff >= 0 ? '+' : ''}${comp.financials.inventoryDaysDiff} 일
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="report-text" style="font-weight: 700; background-color: #f8fafc; padding: 15px; border: 1px solid #e2e8f0; border-radius: 6px; margin-top: 15px;">
                        * 공시 연동 실질 영업이익 재산출 공식 반영:<br>
                        - 공시 영업이익 (최근 분기): ${reportedOPText} (직전년도 연간: ${reportedOP2025Text})<br>
                        - ${inventoryValTxt}<br>
                        - <strong>기저효과 제거 실질 영업이익: ${adjustedOPText}</strong> (재고 평가 손익 효과 제외 시)
                    </div>

                    <h3 style="font-size: 14px; font-weight: 700; margin: 25px 0 10px 0;">[정성 데이터]</h3>
                    <div class="report-text">
                        ${comp.opinion}
                    </div>
                </div>
            `;

            reportCard.style.display = 'block';
        }
    </script>
</body>
</html>
